worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        charset utf-8;
        index index.html;

        # API 反向代理
        location /api/ {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 首页
        location = / {
            try_files /index.html =404;
        }

        # 录音采集
        location = /capture {
            try_files /pages/capture.html =404;
        }

        # 录音文件
        location = /recordings {
            try_files /pages/recordings/index.html =404;
        }

        # 歌曲库
        location = /songs {
            try_files /pages/songs/index.html =404;
        }
        location = /songs/add {
            try_files /pages/songs/add.html =404;
        }
        location = /songs/detail {
            try_files /pages/songs/detail/index.html =404;
        }

        # 歌手
        location = /artists {
            try_files /pages/artists/index.html =404;
        }
        location = /artists/add {
            try_files /pages/artists/add.html =404;
        }
        location = /artists/detail {
            try_files /pages/artists/detail/index.html =404;
        }

        # 提取
        location = /transcribe {
            try_files /pages/transcribe/index.html =404;
        }

        # pages 目录
        location /pages/ {
            try_files $uri $uri/index.html =404;
        }

        # JS
        location /js/ {
            expires 30d;
        }

        # 默认
        location / {
            return 404;
        }
    }
}
